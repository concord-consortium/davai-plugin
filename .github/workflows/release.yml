name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: The git tag for the version to use for index.html
        required: true
env:
  BUCKET: models-resources
  PREFIX: davai-plugin
  SRC_FILE: index-top.html
  DEST_FILE: index.html
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: arn:aws:iam::612297603577:role/davai-plugin
          aws-region: us-east-1
      - run: >
          aws s3 cp
          s3://${{ env.BUCKET }}/${{ env.PREFIX }}/version/${{ github.event.inputs.version }}/${{ env.SRC_FILE }}
          s3://${{ env.BUCKET }}/${{ env.PREFIX }}/${{ env.DEST_FILE }}
